<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isha's Curtain Studio</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark: #1a1a1a;
            --soft-bg: #fafafa;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--soft-bg);
            color: var(--dark);
            margin: 0; padding: 40px 20px;
        }

        .studio-card {
            max-width: 900px;
            margin: auto;
            background: var(--white);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.1);
            display: flex;
            flex-wrap: wrap;
        }

        /* Left Side: Inputs */
        .controls {
            flex: 1;
            min-width: 350px;
            padding: 40px;
            background: #fff;
        }

        /* Right Side: Visuals */
        .visualizer {
            flex: 1;
            min-width: 350px;
            background: #f1f1f1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-left: 1px solid #eee;
        }

        h1 { font-size: 24px; margin-bottom: 30px; letter-spacing: 1px; color: var(--gold); text-transform: uppercase; }

        .input-box { margin-bottom: 20px; }
        label { display: block; font-size: 12px; margin-bottom: 8px; font-weight: 600; color: #888; }
        
        input, select {
            width: 100%; padding: 14px; border: 1.5px solid #eee; border-radius: 12px;
            font-size: 15px; outline: none; transition: 0.3s;
        }

        input:focus { border-color: var(--gold); }

        .btn-calc {
            width: 100%; padding: 16px; background: var(--dark); color: white;
            border: none; border-radius: 12px; font-weight: bold; cursor: pointer;
            margin-top: 10px; transition: 0.3s; letter-spacing: 1px;
        }

        .btn-calc:hover { background: var(--gold); transform: translateY(-2px); }

        /* Schematic View Styles */
        .window-blueprint {
            width: 220px; height: 280px; border: 10px solid #444; border-radius: 4px;
            position: relative; background: #fff; box-shadow: inset 0 0 20px rgba(0,0,0,0.05);
        }

        .rod {
            position: absolute; top: -18px; left: -10%; width: 120%;
            height: 8px; background: #222; border-radius: 10px;
        }

        .panels-wrap {
            display: flex; height: 105%; width: 100%; position: absolute; top: -5px; gap: 4px; padding: 0 5px; box-sizing: border-box;
        }

        .curtain-panel {
            flex: 1; background: var(--gold); opacity: 0.85; border-radius: 3px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }

        /* Results Quote */
        .quote-sheet {
            margin-top: 30px; padding: 20px; border-radius: 15px;
            background: #fff; width: 100%; display: none;
        }

        .row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 14px; border-bottom: 1px solid #f9f9f9; padding-bottom: 5px; }
        .total-price { font-size: 24px; color: #b30000; font-weight: bold; margin-top: 15px; }
        .logic-tag { font-size: 11px; color: #999; margin-top: 20px; line-height: 1.6; }
    </style>
</head>
<body>

<div class="studio-card">
    <!-- INPUT SECTION -->
    <div class="controls">
        <h1>Isha's Studio</h1>
        
        <div class="input-box">
            <label>WINDOW WIDTH (INCHES)</label>
            <input type="number" id="wW" placeholder="e.g. 48">
        </div>

        <div class="input-box">
            <label>height (INCHES)</label>
            <input type="number" id="wL" placeholder="e.g. 84">
        </div>

        <div class="input-box">
            <label>FABRIC PANHA (WIDTH)</label>
            <select id="pType">
                <option value="48">48 Inch Panha</option>
                <option value="54">54 Inch Panha</option>
            </select>
        </div>

        <div class="input-box">
            <label>PRICE PER METER (₹)</label>
            <input type="number" id="rate" placeholder="e.g. 500">
        </div>

        <button class="btn-calc" onclick="createQuote()">CREATE DESIGN QUOTE</button>
    </div>

    <!-- VISUAL SECTION -->
    <div class="visualizer">
        <div class="window-blueprint">
            <div class="rod"></div>
            <div class="panels-wrap" id="panelBox"></div>
        </div>

        <div class="quote-sheet" id="quoteBox">
            <div class="row"><span>Total Panels:</span> <b id="rPan">0</b></div>
            <div class="row"><span>Cutting Height:</span> <b id="rCut">0"</b></div>
            <div class="row"><span>Total Fabric:</span> <b id="rMtr">0 Mtr</b></div>
            <div class="total-price" id="rCost">₹ 0</div>
            
            <div class="logic-tag">
                <b>Design Logic:</b> Used 2.5x fullness. Fabric width is calculated after minus 4 inches for stitching margins+10. Total meters rounded to the nearest 0.25m.
            </div>
        </div>
    </div>
</div>

<script>
function createQuote() {
    let w = parseFloat(document.getElementById('wW').value);
    let h = parseFloat(document.getElementById('wL').value);
    let p = parseInt(document.getElementById('pType').value);
    let r = parseFloat(document.getElementById('rate').value) || 0;

    if(!w || !h) { alert("Please enter measurements!"); return; }

    // --- LOGIC ---
    let effectivePanha = p - 4; // Minus 4" for side stitching
    let fullness = 2.0; 
    let panels = Math.ceil((w * fullness) / effectivePanha);
    let cutLength = h + 10; // 4" Top + 6" Bottom fold
    
    let totalInches = panels * cutLength;
    let rawMtr = totalInches / 39.37;
    let finalMtr = (Math.ceil(rawMtr * 4) / 4).toFixed(2); // Round to nearest 0.25
    let cost = Math.round(finalMtr * r);

    // Update Text
    document.getElementById('rPan').innerText = panels;
    document.getElementById('rCut').innerText = cutLength + '"';
    document.getElementById('rMtr').innerText = finalMtr;
    document.getElementById('rCost').innerText = "₹ " + cost.toLocaleString('en-IN');
    
    // Update Schematic View
    const pBox = document.getElementById('panelBox');
    pBox.innerHTML = '';
    for(let i=0; i<panels; i++) {
        let pDiv = document.createElement('div');
        pDiv.className = 'curtain-panel';
        pBox.appendChild(pDiv);
    }

    document.getElementById('quoteBox').style.display = 'block';
}
</script>

</body>
</html>
