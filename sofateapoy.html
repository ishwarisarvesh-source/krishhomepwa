<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Isha Teapoy Studio | Professional Rft Quote</title>
    <style>
        :root { --wood: #5d4037; --gold: #d4af37; --bg: #fdfaf6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; }
        
        .studio-card {
            max-width: 900px; margin: auto; background: white; border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-wrap: wrap;
        }

        .header { width: 100%; background: var(--wood); color: var(--gold); padding: 25px; text-align: center; border-bottom: 4px solid var(--gold); }
        .header h1 { margin: 0; letter-spacing: 4px; font-weight: 300; }

        .inputs { flex: 1; min-width: 320px; padding: 35px; border-right: 1px solid #eee; }
        .visuals { flex: 1; min-width: 320px; padding: 35px; background: #fafafa; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        label { display: block; font-size: 11px; font-weight: bold; color: #888; margin-bottom: 8px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1.5px solid #eee; border-radius: 10px; font-size: 15px; outline: none; }

        .btn-calc { width: 100%; padding: 16px; background: var(--wood); color: var(--gold); border: none; font-weight: bold; cursor: pointer; border-radius: 10px; font-size: 16px; transition: 0.3s; }
        .btn-calc:hover { background: #000; letter-spacing: 1px; }

        /* Schematic 3D-ish View */
        .table-preview {
            width: 100%; min-height: 220px; position: relative;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
        }
        .top-surface { width: 60px; height: 12px; background: var(--gold); border-radius: 4px; transition: 0.8s ease; opacity: 0.2; z-index: 2; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .legs-structure { width: 50px; border-left: 8px solid var(--wood); border-right: 8px solid var(--wood); transition: 0.8s ease; height: 30px; z-index: 1; border-bottom: 2px solid #ddd; }

        .result-box { margin-top: 25px; width: 100%; display: none; text-align: left; animation: fadeIn 0.5s; }
        .total-price { font-size: 32px; color: #b30000; font-weight: bold; text-align: center; margin: 15px 0; border-top: 1px solid #eee; padding-top: 15px; }
        
        .formula-box { background: #fffbe6; padding: 15px; border: 1px dashed var(--gold); border-radius: 10px; font-size: 13px; color: #333; line-height: 1.6; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="studio-card">
    <div class="header">
        <h1>ISHA TEAPOY STUDIO</h1>
        <p style="margin:5px 0 0; font-size:10px; color:#c19a6b; letter-spacing: 2px;">KRISH FURNISHING HOUSE | COMPLETE DIMENSIONS</p>
    </div>

    <!-- Inputs for Length, Width, Height -->
    <div class="inputs">
        <label>Length (L) - Inches</label>
        <input type="number" id="tL" placeholder="e.g. 48">

        <label>Width (W) - Inches</label>
        <input type="number" id="tW" placeholder="e.g. 24">

        <label>Height (H) - Inches</label>
        <input type="number" id="tH" placeholder="e.g. 18">

        <label>Rate Per Running Foot (₹)</label>
        <input type="number" id="rate" placeholder="e.g. 1500">

        <button class="btn-calc" onclick="calculateCompleteRft()">GENERATE QUOTATION</button>
    </div>

    <!-- Visual Schematic -->
    <div class="visuals">
        <div class="table-preview">
            <div class="top-surface" id="topVis"></div>
            <div class="legs-structure" id="legVis"></div>
        </div>

        <div id="resBox" class="result-box">
            <div style="font-size: 14px; margin-bottom: 5px;">
                Size: <b id="displayDim">0" x 0" x 0"</b>
            </div>
            <div>Total Running Feet: <b><span id="outRft">0</span> Rft.</b></div>
            <div class="total-price" id="outTotal">₹ 0</div>
            
            <div class="formula-box">
                <b>Standard Rft Formula:</b><br>
                1. Rft = Length" ÷ 12<br>
                2. Price = Total Rft × Rate<br>
                <i>*Width and Height are used for structural reference.</i>
            </div>
        </div>
    </div>
</div>

<script>
function calculateCompleteRft() {
    let l = parseFloat(document.getElementById('tL').value);
    let w = parseFloat(document.getElementById('tW').value);
    let h = parseFloat(document.getElementById('tH').value);
    let r = parseFloat(document.getElementById('rate').value) || 0;

    if(!l || !w || !h) { 
        alert("Please enter Length, Width and Height!"); 
        return; 
    }

    // Rft Calculation based on Length
    let rft = l / 12;
    let finalRft = rft.toFixed(2);
    let totalCost = Math.round(finalRft * r);

    // Update Text Results
    document.getElementById('displayDim').innerText = l + '" (L) x ' + w + '" (W) x ' + h + '" (H)';
    document.getElementById('outRft').innerText = finalRft;
    document.getElementById('outTotal').innerText = "Total: ₹ " + totalCost.toLocaleString('en-IN');
    document.getElementById('resBox').style.display = "block";

    // Update Visual Schematic
    let top = document.getElementById('topVis');
    let legs = document.getElementById('legVis');

    top.style.opacity = "1";
    
    // Scale Length (Horizontal)
    let visualLen = (l * 4);
    if(visualLen > 280) visualLen = 280;
    top.style.width = visualLen + "px";
    legs.style.width = (visualLen * 0.8) + "px";

    // Scale Height (Vertical)
    legs.style.height = (h * 4) + "px";
    
    // Scale Width (Visual depth effect using opacity/shadow)
    top.style.boxShadow = `0 ${w/4}px 15px rgba(0,0,0,0.15)`;
}
</script>

</body>
</html>
