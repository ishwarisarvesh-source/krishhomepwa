<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bed Back Master | Krish Furnishing</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fdfaf6; text-align: center; padding: 20px; }
        .box { background: white; padding: 30px; border-radius: 20px; display: inline-block; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 10px solid #5d4037; max-width: 450px; width: 95%; }
        h2 { color: #5d4037; margin-bottom: 15px; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { width: 95%; padding: 15px; background: #5d4037; color: #d4af37; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 16px; }
        
        /* Schematic View */
        #bedFrame { margin: 20px auto; width: 220px; height: 140px; border: 4px solid #5d4037; background: #d7ccc8; border-radius: 10px 10px 0 0; display: none; position: relative; overflow: hidden; }
        .padding-layer { position: absolute; top: 10%; left: 10%; width: 80%; height: 80%; border: 1px dashed #5d4037; background: rgba(255,255,255,0.3); }

        #report { margin-top: 25px; text-align: left; background: #fffcf5; padding: 20px; border-radius: 12px; display: none; border-left: 5px solid #28a745; }
        .note { font-size: 11px; color: #777; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="box">
        <h2>🛏️ Bed Back Costing Pro</h2>
        <p style="font-size: 14px; color: #666;">Ply + Foam + Fabric Complete Quote</p>
        
        <!-- Dimensions in Inches -->
        <input type="number" id="w" placeholder="Width (Inches)">
        <input type="number" id="h" placeholder="Height (Inches)">
        
        <!-- Total Project Rate (Ply + Foam + Fabric + Labor) -->
        <input type="number" id="rate" placeholder="Total Rate per Sq.Ft (₹)">
        
        <button onclick="calcBedBack()">Generate Full Quotation</button>

        <div id="bedFrame">
            <div class="padding-layer"></div>
            <p style="font-size: 10px; margin-top: 60px; font-weight: bold; color: #5d4037;">PLY + FOAM LAYOUT</p>
        </div>

        <div id="report">
            <p id="sqft_out"></p>
            <p id="ply_out" style="font-size: 13px; color: #555;"></p>
            <p id="fabric_needed" style="font-size: 13px; color: #555;"></p>
            <hr>
            <h3 id="cost_out" style="color: #28a745; margin: 5px 0;"></h3>
        </div>

        <div class="note">
            *Logic: Sq.Ft = (W*H)/144 | Fabric includes 20% wastage for tufting | Quote includes Ply, Foam, and Labor.
        </div>
    </div>

    <script>
        function calcBedBack() {
            let w = Number(document.getElementById('w').value);
            let h = Number(document.getElementById('h').value);
            let rate = Number(document.getElementById('rate').value);

            if(w > 0 && h > 0 && rate > 0) {
                // 1. Total Square Feet of the Board
                let totalSqFt = (w * h) / 144;
                
                // 2. Exact Fabric Meters (Adding 12 inches extra for wrapping and tufting)
                // (W+12)*(H+12) / 1550 (approx sq inch in a meter of 54" fabric)
                let fabricMeters = ((w + 12) * (h + 12) / 1550).toFixed(2);
                
                // 3. Total Project Cost
                let totalCost = Math.round(totalSqFt * rate);

                document.getElementById('bedFrame').style.display = "block";
                document.getElementById('report').style.display = "block";
                
                document.getElementById('sqft_out').innerHTML = "📐 <b>Total Area:</b> " + totalSqFt.toFixed(2) + " Sq.Ft";
                document.getElementById('ply_out').innerHTML = "🪵 <b>Ply & Foam Needed:</b> Same as Total Area";
                document.getElementById('fabric_needed').innerHTML = "🧵 <b>Approx Fabric Needed:</b> " + fabricMeters + " Meters";
                document.getElementById('cost_out').innerHTML = "💰 Total Project Quote: ₹" + totalCost.toLocaleString('en-IN');
            } else {
                alert("Please fill all details!");
            }
        }
    </script>

</body>
</html>
